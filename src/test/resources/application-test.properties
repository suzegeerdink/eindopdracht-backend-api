spring.application.name=eindopdracht-backend-api

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/eindopdracht-api
spring.security.oauth2.resourceserver.jwt.audiences=eindopdracht-backend-api
client-id=eindopdracht-backend-api